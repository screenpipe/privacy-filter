# screenpipe — Tinfoil confidential-compute deployment for the privacy-filter
# service. Update the image digest below after pushing to ghcr.io (CI can do
# this automatically; for a manual release see README.md).
#
# Deploy via the Tinfoil dashboard (https://dash.tinfoil.sh): create an org,
# connect GitHub, point it at this repo, push a git tag. Tinfoil auto-pulls
# the image at the pinned digest, runs remote attestation, and exposes the
# service at https://<name>.<org>.containers.tinfoil.dev.
#
# ── v0.5.0: co-host Gemma 4 E4B (audio + vision + chat) ────────────────
# One image, one Tinfoil container, one shim, two GPU workloads on the
# H200 (~141 GB VRAM):
#   1. privacy-filter   (text PII + image PII)                 ~16 GB
#   2. Gemma 4 E4B vLLM (chat + vision + audio, BF16)          ~21 GB
#      (16 GB weights + ~5 GB KV at --gpu-memory-utilization 0.25)
# The 31B model stays on Tinfoil's hosted inference.tinfoil.sh path,
# reached via packages/ai-gateway in the Cloudflare worker — it's a
# different model with different trade-offs, not a replacement for E4B.
# E4B is the only Gemma 4 variant with native audio understanding.
#
# vLLM runs as a sibling process inside the same container started by
# `entrypoint.sh`; FastAPI proxies /v1/* to it on localhost:8001.

cvm-version: 0.7.5

# CPU stays at 16 (vLLM scheduler is light). Memory at 131072 (128 GB)
# because the now-larger image (+16 GB for E4B weights baked in;
# E4B isn't on Tinfoil's modelwrap system yet) needs more ramdisk room
# during pull. Tinfoil only accepts a fixed set of tiers — 2048, 4096,
# 8192, 16384, 32768, 65536, 131072, 262144, … — so 96 GB (98304) is
# rejected as "not a valid tier". 128 GB is the next valid step up.
cpus: 16
memory: 131072
gpus: 1

containers:
  - name: privacy-filter
    # Pinned via .github/workflows/release.yml (workflow_dispatch).
    # Bump flow: dispatch release.yml → copy digest from "Print digest"
    # step → paste here → commit → push a new `v*` tag to trigger
    # tinfoil-build.yml which attests this exact digest.
    image: "ghcr.io/screenpipe/privacy-filter:0.7.9@sha256:31db2722ea5450aeb54df08ab46fd974fc3c72c6850a207c9d42545f6c37cde3"
    runtime: nvidia
    gpus: all
    # ipc:host is required by some CUDA workloads (PyTorch's shared-mem
    # tensor pool, NCCL collectives) — match Tinfoil's other GPU
    # containers (e.g. their confidential-gemma4-31b) for consistency.
    ipc: host
    env:
      - PORT: "8080"
      # vLLM listens on this loopback port; server.py reverse-proxies
      # /v1/* to it. Same container = same network namespace = 127.0.0.1.
      - GEMMA_UPSTREAM: "http://127.0.0.1:8001"
    restart: "always"
    healthcheck:
      # /healthz (not /health) folds in the gemma-restart policy: 200 while
      # gemma is up or while entrypoint.sh's supervisor is restarting a
      # crashed vLLM; 503 once gemma has been continuously down past
      # GEMMA_UNHEALTHY_AFTER (default 900 s) — i.e. restarts aren't sticking.
      # This marks the container unhealthy for observability, but the actual
      # recycle is driven by entrypoint.sh's watchdog (v0.7.7), which exits
      # PID 1 on a sustained 503 so `restart: always` fires — `restart:
      # always` does NOT recycle on an unhealthy healthcheck alone, only on
      # container exit. urlopen raises on the 503, failing the check.
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3)"]
      interval: "15s"
      timeout: "5s"
      retries: 10
      # 10 min grace — E4B BF16 weight load from the image to VRAM is
      # ~30 s plus a few seconds of CUDA graph compile. The privacy
      # filter /healthz endpoint comes up first and stays 200 while E4B
      # is still loading (the 900 s downtime grace covers boot), so
      # /filter is responsive immediately.
      start_period: "600s"

shim:
  upstream-port: 8080
  # /v1/chat/completions and /v1/responses go through Tinfoil's
  # control-plane API-key check. /filter, /image/detect, /health stay
  # un-authenticated for the existing screenpipe-redact clients — same
  # posture as v0.3.x to avoid breaking them on this rollout.
  authenticated: true
  authenticated-endpoints:
    - /v1/chat/completions
    - /v1/responses
  # Any path not listed is rejected with 404 at the shim — no debug or
  # introspection leaks. /v1/* surface is for Gemma E4B chat / audio /
  # vision; everything else mirrors v0.3.x.
  paths:
    - /health
    - /filter
    - /image/detect
    - /v1/chat/completions
    - /v1/models
    - /v1/responses
    - /metrics
