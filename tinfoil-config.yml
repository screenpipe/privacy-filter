# screenpipe — Tinfoil confidential-compute deployment for the privacy-filter
# service. Update the image digest below after pushing to ghcr.io (CI can do
# this automatically; for a manual release see README.md).
#
# Deploy via the Tinfoil dashboard (https://dash.tinfoil.sh): create an org,
# connect GitHub, point it at this repo, push a git tag. Tinfoil auto-pulls
# the image at the pinned digest, runs remote attestation, and exposes the
# service at https://<name>.<org>.containers.tinfoil.dev.

cvm-version: 0.7.5

# No GPU: the model's MoE has only 50M active params per token and banded
# attention keeps it O(N). 8 vCPU with 32 GB — the image is ~3.5 GB uncompressed
# and Tinfoil's enclave ramdisk needs ~2× that during `docker pull`
# (compressed + extracted), so 16 GB total was not enough headroom and
# pulls were failing with "failed to send write" during ingest.
cpus: 8
memory: 32768

containers:
  - name: privacy-filter
    # Pinned via .github/workflows/release.yml (workflow_dispatch).
    # Bump flow: dispatch release.yml → copy digest from "Print digest"
    # step → paste here → commit → push a new `v*` tag to trigger
    # tinfoil-build.yml which attests this exact digest.
    image: "ghcr.io/screenpipe/privacy-filter:0.1.4@sha256:aa66467dbdc2df8e7f26bc35c229b051d2f5458868f5da5f511e71e9f8dd9cf0"
    env:
      - PORT: "8080"
    restart: "always"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)"]
      interval: "15s"
      timeout: "5s"
      retries: 6
      start_period: "120s"

shim:
  upstream-port: 8080
  # Only /health and /filter are reachable from outside the enclave. Any
  # other path is rejected with 404 — no debug/introspection leaks.
  paths:
    - /health
    - /filter
