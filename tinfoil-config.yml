# screenpipe — Tinfoil confidential-compute deployment for the privacy-filter
# service. Update the image digest below after pushing to ghcr.io (CI can do
# this automatically; for a manual release see README.md).
#
# Deploy via the Tinfoil dashboard (https://dash.tinfoil.sh): create an org,
# connect GitHub, point it at this repo, push a git tag. Tinfoil auto-pulls
# the image at the pinned digest, runs remote attestation, and exposes the
# service at https://<name>.<org>.containers.tinfoil.dev.
#
# ── v0.4.0: co-host Gemma 4 31B in this same container ─────────────────
# One image, one Tinfoil container, one shim, two GPU workloads sharing
# the H200 (~141 GB VRAM):
#   1. privacy-filter      (text PII + image PII)         ~16 GB
#   2. Gemma 4 31B (vLLM)  served at /v1/chat/completions  ~62 GB weights
#      + KV cache pool sized via --gpu-memory-utilization      ~47 GB
# vLLM runs as a sibling process inside the same container started by
# `entrypoint.sh`; FastAPI proxies /v1/* to it on localhost:8001.

cvm-version: 0.7.5

# CPU/mem bumped from 8/64 to 16/96. vLLM serving wants more cores than
# the original 8; RAM bumped so the (now larger) image pull, vLLM page
# tables, and the OPF/rfdetr models all fit on Tinfoil's ramdisk-backed
# deploy path. The 62 GB Gemma weights themselves come from /tinfoil/mpk
# (the attested model volume), not the image, so the image stays modest.
cpus: 16
memory: 98304
gpus: 1

# Mounts the read-only attested model volume into the container at
# /tinfoil/mpk/mpk-<digest>. Same `mpk` value Tinfoil ships for their
# official confidential-gemma4-31b deployment — model files are
# identical so the measurement matches, no re-wrap needed.
models:
  - name: "gemma4-31b"
    repo: "google/gemma-4-31B-it@439edf5652646a0d1bd8b46bfdc1d3645761a445"
    mpk: "718354742d7b263c729ea11fbef3e744d61815c5b05043eea6ba0dd3ee44ea01_62578688000_27fb23ac-db9b-5e25-991a-90fdf2c9b3a7"

containers:
  - name: privacy-filter
    # Pinned via .github/workflows/release.yml (workflow_dispatch).
    # Bump flow: dispatch release.yml → copy digest from "Print digest"
    # step → paste here → commit → push a new `v*` tag to trigger
    # tinfoil-build.yml which attests this exact digest.
    image: "ghcr.io/screenpipe/privacy-filter:0.4.0@sha256:REPLACE_AFTER_BUILD"
    runtime: nvidia
    gpus: all
    # ipc:host is required by some CUDA workloads (PyTorch's shared-mem
    # tensor pool, NCCL collectives) — set it to match Tinfoil's other
    # GPU containers (e.g. confidential-gemma4-31b) and avoid surprises.
    ipc: host
    env:
      - PORT: "8080"
      # vLLM listens on this loopback port; server.py reverse-proxies
      # /v1/* to it. Same container = same network namespace = 127.0.0.1.
      - GEMMA_UPSTREAM: "http://127.0.0.1:8001"
      - GEMMA_MPK_PATH: "/tinfoil/mpk/mpk-718354742d7b263c729ea11fbef3e744d61815c5b05043eea6ba0dd3ee44ea01"
    restart: "always"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)"]
      interval: "15s"
      timeout: "5s"
      retries: 10
      # 30 min grace: Gemma 4 31B BF16 weight load from the attested
      # ramdisk takes a few minutes; vLLM warmup compiles CUDA graphs
      # after that. Privacy-filter healthcheck on /health responds as
      # soon as the redactor is up — it does NOT block on vLLM.
      start_period: "1800s"

shim:
  upstream-port: 8080
  # /v1/chat/completions and /v1/responses go through Tinfoil's
  # control-plane API-key check. /filter, /image/detect, /health stay
  # un-authenticated for the existing screenpipe-redact clients — same
  # posture as v0.3.x to avoid breaking them on this rollout.
  authenticated: true
  authenticated-endpoints:
    - /v1/chat/completions
    - /v1/responses
  # Any path not listed is rejected with 404 at the shim — no debug or
  # introspection leaks. Adding the /v1/* surface for Gemma chat
  # completions; everything else mirrors v0.3.x.
  paths:
    - /health
    - /filter
    - /image/detect
    - /v1/chat/completions
    - /v1/models
    - /v1/responses
    - /metrics
